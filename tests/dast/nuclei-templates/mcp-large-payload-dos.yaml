id: mcp-large-payload-dos

info:
  name: MCP Large Payload DoS
  author: crowdsentinel
  severity: medium
  description: |
    Sends an oversized index name (~1KB of repeated characters) to
    verify the server handles large payloads gracefully without
    crashing, leaking stack traces, or exhausting memory.
  tags: mcp,large-payload,resilience

http:
  - raw:
      - |
        POST /mcp/ HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        Accept: application/json, text/event-stream

        {"jsonrpc":"2.0","method":"tools/call","params":{"name":"search_documents","arguments":{"index":"","query":"*"}},"id":1}

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
          - 400
          - 413
        condition: or

      - type: word
        part: body
        words:
          - "Traceback"
          - "MemoryError"
          - "killed"
        negative: true
        condition: and
