# Publish to PyPI using Trusted Publishing (OIDC)
# No API tokens required — authenticates via GitHub OIDC identity
# See: https://docs.pypi.org/trusted-publishers/

name: PyPI Publish

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # Required for Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/crowdsentinel-mcp-server/

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync

    - name: Build package
      run: uv build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
