# Publish Python packages to PyPI using Trusted Publishing (OIDC)
# No API tokens required — authenticates via GitHub OIDC identity
# See: https://docs.pypi.org/trusted-publishers/

name: PyPI Publish

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    # Required for Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/crowdsentinel-mcp-server/

    strategy:
      matrix:
        variant:
          - name: "crowdsentinel-mcp-server-es7"
            elasticsearch_version: "7.13.0"
          - name: "crowdsentinel-mcp-server"
            elasticsearch_version: "8.17.2"
          - name: "crowdsentinel-mcp-server-es9"
            elasticsearch_version: "9.0.0"
          - name: "opensearch-mcp-server"
            elasticsearch_version: "8.17.2"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      run: uv sync

    - name: Modify pyproject.toml for ${{ matrix.variant.name }}
      run: |
        # Update package name
        sed -i 's/^name = .*$/name = "${{ matrix.variant.name }}"/' pyproject.toml

        # Update elasticsearch version
        sed -i 's/elasticsearch==.*/elasticsearch==${{ matrix.variant.elasticsearch_version }}",/' pyproject.toml

        # Update script name to match package name (only for non-opensearch packages)
        if [[ "${{ matrix.variant.name }}" != "opensearch-mcp-server" ]]; then
          sed -i 's/^crowdsentinel-mcp-server = /"${{ matrix.variant.name }}" = /' pyproject.toml
        fi

    - name: Build ${{ matrix.variant.name }} package
      run: uv build

    - name: Publish ${{ matrix.variant.name }} to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Clean dist directory
      run: rm -rf dist/*
