name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Install linters
        run: uv tool install ruff

      - name: Ruff check (lint)
        run: |
          ruff check src/ tests/ \
            --select E,F,W,I,UP,B,SIM,C4,PIE,PT,RET,ERA \
            --ignore E501,E402,F841,B904,B011,B905,PT011,PT015,PT017,PT018,SIM102,SIM103,SIM105,SIM108,SIM115,SIM118,B007,B024,C414,C401,ERA001,W293,RET504,PIE790,PIE810,PT003,PT006,PT009,PT019,PT027,RET505 \
            --output-format github

      - name: Ruff format check
        run: |
          ruff format --check --diff src/ tests/ || {
            echo "::warning::Code formatting issues found. Run 'ruff format src/ tests/' to fix."
            exit 0
          }

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Clone detection-rules
        run: git clone --depth 1 https://github.com/elastic/detection-rules.git detection-rules

      - name: Install dependencies
        run: uv sync

      - name: Run pyright (basic)
        run: |
          uv tool install pyright
          pyright src/ --level basic 2>&1 || {
            echo "::warning::Type check issues found (non-blocking)"
            exit 0
          }

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    needs: [lint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4

      - name: Clone detection-rules (required by hatchling build)
        run: git clone --depth 1 https://github.com/elastic/detection-rules.git detection-rules

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_live_elasticsearch_integration.py \
            --ignore=tests/wireshark/test_tshark_executor.py \
            -v --tb=short

  cli-tests:
    name: CLI Integration Tests
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Clone detection-rules
        run: git clone --depth 1 https://github.com/elastic/detection-rules.git detection-rules

      - name: Install dependencies
        run: uv sync

      - name: Run CLI tests
        run: |
          uv run pytest tests/cli/ -v --tb=short

  sast:
    name: SAST
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install SAST tools
        run: pip install bandit semgrep

      - name: Run Bandit
        run: |
          bandit -r src/ -f json -o bandit-results.json || true

          python3 << 'PYEOF'
          import json
          import sys

          with open("bandit-results.json", "r") as f:
              data = json.load(f)

          results = data.get("results", [])
          has_high = False

          for issue in results:
              severity = issue.get("severity", "").upper()
              confidence = issue.get("confidence", "").upper()
              filename = issue.get("filename", "")
              line = issue.get("line_number", 0)
              test_id = issue.get("test_id", "")
              text = issue.get("issue_text", "")

              if severity == "HIGH":
                  has_high = True
                  print(f"::error file={filename},line={line}::[{test_id}] {severity}/{confidence}: {text}")
              elif severity == "MEDIUM":
                  print(f"::warning file={filename},line={line}::[{test_id}] {severity}/{confidence}: {text}")

          if has_high:
              print("::error::Bandit found HIGH severity issues. Failing the build.")
              sys.exit(1)

          print("Bandit: no HIGH severity issues found.")
          PYEOF

      - name: Run Semgrep
        run: |
          semgrep scan --config auto src/ --json -o semgrep-results.json || true

          python3 << 'PYEOF'
          import json
          import sys

          with open("semgrep-results.json", "r") as f:
              data = json.load(f)

          results = data.get("results", [])
          has_error = False

          for finding in results:
              severity = finding.get("extra", {}).get("severity", "").upper()
              path = finding.get("path", "")
              start = finding.get("start", {})
              line = start.get("line", 0)
              rule_id = finding.get("check_id", "")
              message = finding.get("extra", {}).get("message", "").replace("\n", " ")

              if severity == "ERROR":
                  has_error = True
                  print(f"::error file={path},line={line}::[{rule_id}] {severity}: {message}")
              elif severity == "WARNING":
                  print(f"::warning file={path},line={line}::[{rule_id}] {severity}: {message}")

          if has_error:
              print("::error::Semgrep found ERROR severity issues. Failing the build.")
              sys.exit(1)

          print("Semgrep: no ERROR severity issues found.")
          PYEOF

      - name: Upload SAST results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-results
          path: |
            bandit-results.json
            semgrep-results.json

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --exclude-files '\.venv/.*' \
            --exclude-files 'uv\.lock' \
            --exclude-files 'detection-rules/.*' \
            --exclude-files '.*\.pyc' \
            > detect-secrets-results.json

          python3 << 'PYEOF'
          import json
          import sys

          with open("detect-secrets-results.json", "r") as f:
              scan_results = json.load(f)

          baseline = {}
          baseline_secrets = set()

          try:
              with open(".secrets.baseline", "r") as f:
                  baseline = json.load(f)
              for filepath, secrets_list in baseline.get("results", {}).items():
                  for secret in secrets_list:
                      baseline_secrets.add((filepath, secret.get("hashed_secret", "")))
              print("Using .secrets.baseline for comparison.")
          except FileNotFoundError:
              print("No .secrets.baseline found; scanning without baseline.")

          new_secrets_in_src = False
          scan_findings = scan_results.get("results", {})

          for filepath, secrets_list in scan_findings.items():
              if not filepath.startswith("src/"):
                  continue

              for secret in secrets_list:
                  hashed = secret.get("hashed_secret", "")
                  if (filepath, hashed) in baseline_secrets:
                      continue

                  new_secrets_in_src = True
                  line = secret.get("line_number", 0)
                  secret_type = secret.get("type", "unknown")
                  print(f"::error file={filepath},line={line}::New secret detected ({secret_type})")

          if new_secrets_in_src:
              print("::error::New secrets detected in src/ files. Failing the build.")
              sys.exit(1)

          print("Secret detection: no new secrets found in src/.")
          PYEOF

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
          output: codeql-results

      - name: Annotate findings
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, sys, glob

          sarif_files = glob.glob("codeql-results/*.sarif")
          if not sarif_files:
              print("CodeQL: no SARIF results found.")
              sys.exit(0)

          total = 0
          high_count = 0

          for sarif_path in sarif_files:
              with open(sarif_path) as f:
                  sarif = json.load(f)

              for run in sarif.get("runs", []):
                  for result in run.get("results", []):
                      total += 1
                      level = result.get("level", "note")
                      rule_id = result.get("ruleId", "unknown")
                      message = result.get("message", {}).get("text", "").replace("\n", " ")[:200]

                      locations = result.get("locations", [])
                      file_info = ""
                      line_info = ""
                      if locations:
                          phys = locations[0].get("physicalLocation", {})
                          artifact = phys.get("artifactLocation", {}).get("uri", "")
                          line = phys.get("region", {}).get("startLine", 1)
                          file_info = f"file={artifact},"
                          line_info = f"line={line}"

                      if level == "error":
                          high_count += 1
                          print(f"::warning {file_info}{line_info}::[CodeQL/{rule_id}] HIGH: {message}")
                      elif level == "warning":
                          print(f"::warning {file_info}{line_info}::[CodeQL/{rule_id}] MEDIUM: {message}")

          print(f"CodeQL: {total} findings, {high_count} HIGH/CRITICAL.")
          PYEOF

      - name: Upload CodeQL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: codeql-results/

  dast-nuclei:
    name: DAST (Nuclei)
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.17.2
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
    env:
      ELASTICSEARCH_HOSTS: "http://localhost:9200"
      VERIFY_CERTS: "false"
      DISABLE_HIGH_RISK_OPERATIONS: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4

      - name: Clone detection-rules
        run: git clone --depth 1 https://github.com/elastic/detection-rules.git detection-rules

      - name: Install dependencies
        run: uv sync

      - name: Start MCP server
        run: |
          uv run crowdsentinel-mcp-server \
            --transport streamable-http \
            --host 0.0.0.0 \
            --port 8000 &
          echo "MCP_PID=$!" >> "$GITHUB_ENV"

          echo "Waiting for MCP server..."
          MCP_READY=false
          for i in $(seq 1 30); do
            if curl -sf --max-time 3 \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-healthcheck","version":"1.0"}},"id":1}' \
              http://127.0.0.1:8000/mcp/ > /dev/null 2>&1; then
              echo "MCP server ready after $((i * 2))s"
              MCP_READY=true
              break
            fi
            echo "  Attempt $i/30..."
            sleep 2
          done

          if [ "$MCP_READY" != "true" ]; then
            echo "::warning::MCP server failed to start after 60s. Nuclei DAST scan will be ineffective."
          fi

      - name: Install Nuclei
        run: |
          NUCLEI_VERSION="3.3.7"
          curl -sL "https://github.com/projectdiscovery/nuclei/releases/download/v${NUCLEI_VERSION}/nuclei_${NUCLEI_VERSION}_linux_amd64.zip" -o nuclei.zip
          unzip -o nuclei.zip nuclei
          chmod +x nuclei
          sudo mv nuclei /usr/local/bin/
          nuclei --version

      - name: Run Nuclei DAST scan
        run: |
          nuclei \
            -t tests/dast/nuclei-templates/ \
            -u http://127.0.0.1:8000 \
            -jsonl -o nuclei-results.jsonl \
            -severity info,low,medium,high,critical \
            -timeout 10 \
            -retries 1 \
            -rate-limit 10 \
            -duc \
            -stats || true

          echo "Nuclei scan complete."

      - name: Annotate Nuclei findings
        if: always()
        run: |
          if [ ! -f nuclei-results.jsonl ]; then
            echo "Nuclei: no results file found."
            exit 0
          fi

          python3 << 'PYEOF'
          import json, sys

          findings = []
          with open("nuclei-results.jsonl") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      findings.append(json.loads(line))
                  except json.JSONDecodeError:
                      continue

          if not findings:
              print("Nuclei: no findings.")
              sys.exit(0)

          high_count = 0
          for finding in findings:
              severity = finding.get("info", {}).get("severity", "info").upper()
              name = finding.get("info", {}).get("name", "unknown")
              template_id = finding.get("template-id", "unknown")
              matched = finding.get("matched-at", "")
              desc = finding.get("info", {}).get("description", "").replace("\n", " ")[:200]

              if severity in ("HIGH", "CRITICAL"):
                  high_count += 1
                  print(f"::warning::[Nuclei/{template_id}] {severity}: {name} at {matched}")
              elif severity == "MEDIUM":
                  print(f"::warning::[Nuclei/{template_id}] {severity}: {name} at {matched}")

          print(f"Nuclei: {len(findings)} findings, {high_count} HIGH/CRITICAL.")
          PYEOF

      - name: Stop MCP server
        if: always()
        run: kill "$MCP_PID" 2>/dev/null || true

      - name: Upload Nuclei results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-dast-results
          path: |
            nuclei-results.jsonl
