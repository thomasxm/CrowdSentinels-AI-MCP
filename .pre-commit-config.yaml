# Pre-commit hooks — mirrors CI linting pipeline locally.
# Install: uv run pre-commit install
# Run all: uv run pre-commit run --all-files

repos:
  # Ruff — fast Python linter + formatter (replaces flake8, isort, black)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        name: ruff check (lint + fix)
        args: [--fix, --exit-non-zero-on-fix]

      - id: ruff-format
        name: ruff format

  # Bandit — static application security testing
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit (SAST — HIGH severity only)
        args: [-c, pyproject.toml, -r, -lll]
        additional_dependencies: ["bandit[toml]"]

  # detect-secrets — prevent accidental secret commits
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            \.venv/.*|
            uv\.lock|
            detection-rules/.*|
            rules/.*|
            .*\.pyc
          )$

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
