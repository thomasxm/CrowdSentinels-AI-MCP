# Pre-commit hooks — mirrors CI linting pipeline locally.
# Install: uv run pre-commit install
# Run all: uv run pre-commit run --all-files

repos:
  # Ruff — fast Python linter + formatter (replaces flake8, isort, black)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        name: ruff check (lint + fix)
        args: [--fix, --exit-non-zero-on-fix]

      - id: ruff-format
        name: ruff format

  # Bandit — static application security testing
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit (SAST — HIGH severity only)
        args: [-c, pyproject.toml, -r, -lll]
        additional_dependencies: ["bandit[toml]"]

  # detect-secrets — prevent accidental secret commits
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            \.venv/.*|
            uv\.lock|
            detection-rules/.*|
            rules/.*|
            .*\.pyc
          )$

  # shellcheck — static analysis for shell scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        name: shellcheck (shell script lint)
        args: [--severity=warning, --shell=bash, -e, SC2155, -e, SC1090]
        exclude: |
          (?x)^(
            detection-rules/.*|
            skills/.*|
            \.venv/.*|
            \.trees/.*
          )$

  # actionlint — GitHub Actions workflow linter
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
        name: actionlint (GitHub Actions lint)

  # yamllint — YAML best-practice linter (complements check-yaml syntax check)
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: yamllint (YAML style)
        args: [-c, .yamllint.yml]
        exclude: |
          (?x)^(
            detection-rules/.*|
            \.venv/.*|
            \.trees/.*|
            rules/.*|
            uv\.lock
          )$

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict

  # pip-audit — dependency vulnerability scanning (network required, pre-push only)
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        name: pip-audit (dependency CVE scan)
        args: [--desc, --output, columns]
        stages: [pre-push]
